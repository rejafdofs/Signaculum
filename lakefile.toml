name = "PuraShiori"
version = "0.1.0"
description = "Lean 4 製 SHIORI/3.0 栞(Ukagaka ghost)ビブリオテーカ(bibliotheca)"
keywords = ["ukagaka", "shiori", "ghost", "sakura-script"]

[leanOptions]
autoImplicit = false
pp.unicode.fun = true

[[require]]
name = "batteries"
scope = "leanprover-community"
rev = "main"

[[require]]
name = "Repl"
git = "https://github.com/leanprover-community/repl"
[[require]]
name = "LemmaGeneralis"
git = "https://github.com/rejafdofs/LemmaGeneralis"
rev = "main"

[[require]]
name = "SstpCliens"
git = "https://github.com/rejafdofs/SstpCliens"
rev = "main"

# ライブラリ本體にゃん。Exemplum（使用例）は含めにゃいにゃ
[[lean_lib]]
name = "PuraShiori"
globs = [
  "PuraShiori",
  "PuraShiori.Protocollum",
  "PuraShiori.SakuraTypi",
  "PuraShiori.SakuraFundamentum",
  "PuraShiori.SakuraTextus",
  "PuraShiori.SakuraFenestra",
  "PuraShiori.SakuraSystema",
  "PuraShiori.SakuraScriptum",
  "PuraShiori.Rogatio",
  "PuraShiori.Responsum",
  "PuraShiori.Nuculum",
  "PuraShiori.Exporta",
  "PuraShiori.StatusPermanens",
  "PuraShiori.InstantiaStatusPermanens",
  "PuraShiori.LemmaStatusPermanens",
  "PuraShiori.Sstp",
  "PuraShiori.Syntaxis",
]
