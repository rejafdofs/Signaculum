name = "PuraShiori"
version = "0.1.0"
description = "Lean 4 製 SHIORI/3.0 栞(Ukagaka ghost)ビブリオテーカ(bibliotheca)"
keywords = ["ukagaka", "shiori", "ghost", "sakura-script"]

[leanOptions]
autoImplicit = false
pp.unicode.fun = true

[[require]]
name = "batteries"
scope = "leanprover-community"
rev = "main"

[[require]]
name = "Repl"
git = "https://github.com/leanprover-community/repl"
[[require]]
name = "LemmaGeneralis"
git = "https://github.com/rejafdofs/LemmaGeneralis"
rev = "main"

# ディレクトゥム SSTP — WM_COPYDATA ヴィアー SSP ニ ソウシン スルニャン
[[extern_lib]]
name = "sstpDirectum"
srcDir = "PuraShiori/c"
linkLibs = ["user32"]

# ライブラリ本體にゃん。Exemplum（使用例）は含めにゃいにゃ
[[lean_lib]]
name = "PuraShiori"
globs = [
  "PuraShiori",
  "PuraShiori.Protocollum",
  "PuraShiori.Sakura.Typi",
  "PuraShiori.Sakura.Fundamentum",
  "PuraShiori.Sakura.Textus",
  "PuraShiori.Sakura.Fenestra",
  "PuraShiori.Sakura.Systema",
  "PuraShiori.Sakura.Scriptum",
  "PuraShiori.Rogatio",
  "PuraShiori.Responsum",
  "PuraShiori.Nuculum",
  "PuraShiori.Exporta",
  "PuraShiori.Memoria.StatusPermanens",
  "PuraShiori.Memoria.Lemma",
  "PuraShiori.Sstp",
  "PuraShiori.Syntaxis",
]
